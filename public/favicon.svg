<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- App background: navy rounded square -->
  <rect width="32" height="32" rx="7" fill="#1e40af"/>

  <!-- Resume/document: white card -->
  <rect x="6" y="5" width="14" height="18" rx="2" fill="white"/>

  <!-- Folded corner -->
  <polygon points="16,5 20,9 16,9" fill="#1e40af" opacity="0.15"/>
  <polyline points="16,5 20,5 20,9 16,9 16,5" fill="none" stroke="#1e40af" stroke-width="0.5" opacity="0.2"/>

  <!-- Text lines on document -->
  <line x1="8.5" y1="12" x2="15.5" y2="12" stroke="#1e40af" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="8.5" y1="15" x2="17.5" y2="15" stroke="#1e40af" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="8.5" y1="18" x2="13.5" y2="18" stroke="#1e40af" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Hired! badge: green circle with checkmark -->
  <circle cx="23" cy="23" r="6" fill="#16a34a"/>
  <polyline points="20,23 22,25.2 26,20.5" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
